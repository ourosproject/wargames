document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

und grid lines */\n  --border-2: #2e2e36;          /* hover border */\n  --text-1: #f0f0f5;            /* primary text */\n  --text-muted: #6e6e78;        /* secondary text, labels */\n  --white: #ffffff;             /* headline emphasis only */\n\n  /* Brand accents */\n  --green: #22c55e;             /* primary brand accent — approval, the mark */\n  --green-dim: rgba(34, 197, 94, 0.1);\n  --cyan: #22d3ee;              /* secondary accent — data, partial states */\n  --cyan-dim: rgba(34, 211, 238, 0.1);\n\n  /* Terminal ANSI mapping (governed REPL output) */\n  --term-green: #22c55e;        /* \\x1b[32m — approved, saved, ok */\n  --term-cyan: #22d3ee;         /* \\x1b[36m — slash commands, trust, info */\n  --term-red: #ef4444;          /* \\x1b[31m — blocked, denied, errors */\n  --term-yellow: #f59e0b;       /* \\x1b[33m — warnings, flags, timeouts */\n  --term-dim: #6e6e78;          /* \\x1b[2m  — metadata, results, hints */\n\n  /* Semantic aliases */\n  --accent: var(--green);\n  --surface-page: var(--bg-0);\n  --surface-card: var(--bg-1);\n  --text-body: var(--text-1);\n  --text-secondary: var(--text-muted);\n  --status-ok: var(--term-green);\n  --status-warn: var(--term-yellow);\n  --status-danger: var(--term-red);\n  --status-info: var(--term-cyan);\n}\n\n/* ── Console theme — operator console (spec-defense-ui-v2) ───────\n   Apply class=\"theme-console\" on a container (or body). */\n.theme-console {\n  --bg-0: #0a0e1a;              /* base — near-black blue */\n  --bg-1: #14192a;              /* surface */\n  --bg-2: #1c2840;              /* elevated surface */\n  --border-1: #1a1f35;\n  --border-2: #2a3352;\n  --text-1: #f0f1f5;\n  --text-2: #b0b8c8;            /* secondary */\n  --text-3: #5a6a8a;            /* tertiary */\n\n  --accent: #00e0ff;            /* ouros console cyan */\n  --status-ok: #00ff88;         /* success / safe / met */\n  --status-warn: #ffa500;       /* warning / caution / POA&M */\n  --status-danger: #ff4444;     /* danger / not met / denied */\n  --audit: #a78bfa;             /* trust / audit / Merkle */\n  --gate: #ffd700;              /* gate / pending decision */\n\n  /* Risk tiers (badge + border, consistent everywhere) */\n  --risk-readonly: #00ff88;     /* ◇ READ_ONLY */\n  --risk-mutating: #ffa500;     /* ◈ MUTATING */\n  --risk-destructive: #ff4444;  /* ◉ DESTRUCTIVE */\n\n  /* Classification banners (DoDM 5200.01) */\n  --cls-unclassified: #2d5a2d;\n  --cls-cui: #1a3a5c;\n  --cls-secret: #5c1a1a;\n\n  --surface-page: var(--bg-0);\n  --surface-card: var(--bg-1);\n  --text-body: var(--text-1);\n  --text-secondary: var(--text-2);\n  --text-muted: var(--text-3);\n  --status-info: var(--accent);\n}\n<\u002Fstyle>\n<style>/* ouros — typography tokens\n   Mono-forward. Mono is the voice of the product: data, commands, hashes,\n   labels, stats. Body sans carries prose only.\n   Stacks from ouros-ops/business/website/index.html. */\n\n:root {\n  /* SF Mono/Monaco on macOS; Fira Code webfont everywhere else (declared\n     in the site's own stack; loaded in tokens/fonts.css). */\n  /* Site stack also listed \"Inconsolata\"; omitted here — Fira Code (webfont) covers that slot. */\n  --font-mono: \"SF Mono\", \"Monaco\", \"Fira Code\", ui-monospace, SFMono-Regular, Menlo, monospace;\n  --font-body: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;\n\n  /* ── Web scale ─────────────────────────────────────────────── */\n  --text-hero: clamp(2.5rem, 5.5vw, 5rem);   /* h1, weight 800, lh 1.05, ls -0.03em */\n  --text-h2: 2.2rem;                          /* section titles, weight 700, ls -0.02em */\n  --text-h3: 1.2rem;                          /* card titles */\n  --text-lead: 1.25rem;                       /* hero subtitle */\n  --text-body-lg: 1.1rem;                     /* section intro */\n  --text-body-md: 1.05rem;                    /* section body, lh 1.7 */\n  --text-body-sm: 0.95rem;                    /* card body, nav */\n  --text-data: 0.85rem;                       /* mono: flow steps, bar labels, table cells */\n  --text-label: 0.8rem;                       /* mono: section labels, uppercase, ls 2px */\n  --text-fine: 0.75rem;                       /* mono: table headers, stat labels, ls 1px */\n\n  --leading-tight: 1.05;\n  --leading-normal: 1.6;\n  --leading-loose: 1.7;\n\n  --tracking-tight: -0.03em;\n  --tracking-h2: -0.02em;\n  --tracking-label: 2px;\n  --tracking-fine: 1px;\n\n  /* ── Console scale (spec-defense-ui-v2: 10/11/12/14/16) ────── */\n  --console-text-meta: 10px;    /* labels, timestamps, metadata */\n  --console-text-body: 11px;    /* body text, tool args */\n  --console-text-input: 12px;   /* input field, button labels */\n  --console-text-header: 14px;  /* card headers, domain names */\n  --console-text-title: 16px;   /* SPRS score, section titles */\n}\n<\u002Fstyle>\n<style>/* ouros — spacing, radii, borders, shadows\n   4px grid: 4/8/12/16/24/32 (spec-defense-ui-v2). Web sections add 48/64/120. */\n\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-section: 120px;      /* web section vertical padding */\n\n  --container-max: 1100px;     /* web content column */\n\n  /* Radii — exact site values */\n  --radius-sm: 6px;            /* bars, badges, small buttons */\n  --radius-md: 8px;            /* buttons, terminal blocks, callouts */\n  --radius-lg: 10px;           /* flow steps, stats */\n  --radius-xl: 12px;           /* feature cards */\n  --radius-2xl: 16px;          /* large cards (contact) */\n\n  /* Borders — 1px always; color does the work */\n  --border-w: 1px;\n\n  /* Shadows — glows only, never drop shadows */\n  --glow-green: 0 10px 30px rgba(34, 197, 94, 0.2);\n  --glow-green-soft: 0 0 20px rgba(34, 197, 94, 0.1);\n  --glow-cyan-soft: 0 0 20px rgba(34, 211, 238, 0.1);\n\n  /* Background grid texture (site body::before) */\n  --grid-size: 80px;\n}\n\n.theme-console {\n  /* Console radii (ouros-console theme.rs: 4/6/8) */\n  --radius-sm: 4px;\n  --radius-md: 6px;\n  --radius-lg: 8px;\n  --radius-xl: 8px;\n  --radius-2xl: 8px;\n}\n<\u002Fstyle>\n<style>/* ouros — base element styles (minimal; tokens do the work) */\n\n* { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  background: var(--surface-page);\n  color: var(--text-body);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n}\n\na { color: var(--accent); text-decoration: none; }\na:hover { color: var(--text-1); }\n\ncode, pre, kbd, samp { font-family: var(--font-mono); }\n\n::selection { background: var(--green-dim); color: var(--text-1); }\n\n/* Background grid texture — apply .ouros-grid-bg to a positioned container */\n.ouros-grid-bg::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background:\n    linear-gradient(to bottom, var(--surface-page) 0%, transparent 30%, transparent 70%, var(--surface-page) 100%),\n    linear-gradient(90deg, var(--border-1) 1px, transparent 1px),\n    linear-gradient(var(--border-1) 1px, transparent 1px);\n  background-size: 100% 100%, var(--grid-size) var(--grid-size), var(--grid-size) var(--grid-size);\n  opacity: 0.4;\n  z-index: 0;\n  pointer-events: none;\n}\n<\u002Fstyle>\n<style>/* ouros — webfonts\n   The product's declared mono stack is \"SF Mono\", \"Monaco\", \"Inconsolata\",\n   \"Fira Code\" — all system/local fonts; no binaries ship in the codebase.\n   Fira Code (in the product's own stack) is loaded from Google Fonts as the\n   cross-platform webfont. Body text uses the system sans stack — no webfont.\n   SUBSTITUTION NOTE: on machines without SF Mono/Monaco, Fira Code renders.\n   If official font binaries exist, replace this import with @font-face rules. */\n\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Fira Code';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d441d856-d1fd-43ef 308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Fira Code';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"378df7d7-5a2b-40ba-9072-24736a89cc55\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ouros — color tokens\n   Source of truth:\n   - Web/brand theme: ouros-ops/business/website/index.html (:root)\n   - Console theme:   ouros/docs/spec-defense-ui-v2.md \"Visual System\"\n   - Terminal ANSI:   ouros/src/govern/mod.rs + crates/ouros-console/src/theme.rs\n*/\n\n:root {\n  /* ── Base — web/brand theme (default) ─────────────────────────── */\n  --bg-0: #08080a;              /* page background */\n  --bg-1: #0f0f12;              /* elevated: cards, panels, terminal blocks */\n  --border-1: #1e1e24;          /* default border + background grid lines */\n  --border-2: #2e2e36;          /* hover border */\n  --text-1: #f0f0f5;            /* primary text */\n  --text-muted: #6e6e78;        /* secondary text, labels */\n  --white: #ffffff;             /* headline emphasis only */\n\n  /* Brand accents */\n  --green: #22c55e;             /* primary brand accent — approval, the mark */\n  --green-dim: rgba(34, 197, 94, 0.1);\n  --cyan: #22d3ee;              /* secondary accent — data, partial states */\n  --cyan-dim: rgba(34, 211, 238, 0.1);\n\n  /* Terminal ANSI mapping (governed REPL output) */\n  --term-green: #22c55e;        /* \\x1b[32m — approved, saved, ok */\n  --term-cyan: #22d3ee;         /* \\x1b[36m — slash commands, trust, info */\n  --term-red: #ef4444;          /* \\x1b[31m — blocked, denied, errors */\n  --term-yellow: #f59e0b;       /* \\x1b[33m — warnings, flags, timeouts */\n  --term-dim: #6e6e78;          /* \\x1b[2m  — metadata, results, hints */\n\n  /* Semantic aliases */\n  --accent: var(--green);\n  --surface-page: var(--bg-0);\n  --surface-card: var(--bg-1);\n  --text-body: var(--text-1);\n  --text-secondary: var(--text-muted);\n  --status-ok: var(--term-green);\n  --status-warn: var(--term-yellow);\n  --status-danger: var(--term-red);\n  --status-info: var(--term-cyan);\n}\n\n/* ── Console theme — operator console (spec-defense-ui-v2) ───────\n   Apply class=\"theme-console\" on a container (or body). */\n.theme-console {\n  --bg-0: #0a0e1a;              /* base — near-black blue */\n  --bg-1: #14192a;              /* surface */\n  --bg-2: #1c2840;              /* elevated surface */\n  --border-1: #1a1f35;\n  --border-2: #2a3352;\n  --text-1: #f0f1f5;\n  --text-2: #b0b8c8;            /* secondary */\n  --text-3: #5a6a8a;            /* tertiary */\n\n  --accent: #00e0ff;            /* ouros console cyan */\n  --status-ok: #00ff88;         /* success / safe / met */\n  --status-warn: #ffa500;       /* warning / caution / POA&M */\n  --status-danger: #ff4444;     /* danger / not met / denied */\n  --audit: #a78bfa;             /* trust / audit / Merkle */\n  --gate: #ffd700;              /* gate / pending decision */\n\n  /* Risk tiers (badge + border, consistent everywhere) */\n  --risk-readonly: #00ff88;     /* ◇ READ_ONLY */\n  --risk-mutating: #ffa500;     /* ◈ MUTATING */\n  --risk-destructive: #ff4444;  /* ◉ DESTRUCTIVE */\n\n  /* Classification banners (DoDM 5200.01) */\n  --cls-unclassified: #2d5a2d;\n  --cls-cui: #1a3a5c;\n  --cls-secret: #5c1a1a;\n\n  --surface-page: var(--bg-0);\n  --surface-card: var(--bg-1);\n  --text-body: var(--text-1);\n  --text-secondary: var(--text-2);\n  --text-muted: var(--text-3);\n  --status-info: var(--accent);\n}\n\n/* ouros — typography tokens\n   Mono-forward. Mono is the voice of the product: data, commands, hashes,\n   labels, stats. Body sans carries prose only.\n   Stacks from ouros-ops/business/website/index.html. */\n\n:root {\n  /* SF Mono/Monaco on macOS; Fira Code webfont everywhere else (declared\n     in the site's own stack; loaded in tokens/fonts.css). */\n  /* Site stack also listed \"Inconsolata\"; omitted here — Fira Code (webfont) covers that slot. */\n  --font-mono: \"SF Mono\", \"Monaco\", \"Fira Code\", ui-monospace, SFMono-Regular, Menlo, monospace;\n  --font-body: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;\n\n  /* ── Web scale ─────────────────────────────────────────────── */\n  --text-hero: clamp(2.5rem, 5.5vw, 5rem);   /* h1, weight 800, lh 1.05, ls -0.03em */\n  --text-h2: 2.2rem;                          /* section titles, weight 700, ls -0.02em */\n  --text-h3: 1.2rem;                          /* card titles */\n  --text-lead: 1.25rem;                       /* hero subtitle */\n  --text-body-lg: 1.1rem;                     /* section intro */\n  --text-body-md: 1.05rem;                    /* section body, lh 1.7 */\n  --text-body-sm: 0.95rem;                    /* card body, nav */\n  --text-data: 0.85rem;                       /* mono: flow steps, bar labels, table cells */\n  --text-label: 0.8rem;                       /* mono: section labels, uppercase, ls 2px */\n  --text-fine: 0.75rem;                       /* mono: table headers, stat labels, ls 1px */\n\n  --leading-tight: 1.05;\n  --leading-normal: 1.6;\n  --leading-loose: 1.7;\n\n  --tracking-tight: -0.03em;\n  --tracking-h2: -0.02em;\n  --tracking-label: 2px;\n  --tracking-fine: 1px;\n\n  /* ── Console scale (spec-defense-ui-v2: 10/11/12/14/16) ────── */\n  --console-text-meta: 10px;    /* labels, timestamps, metadata */\n  --console-text-body: 11px;    /* body text, tool args */\n  --console-text-input: 12px;   /* input field, button labels */\n  --console-text-header: 14px;  /* card headers, domain names */\n  --console-text-title: 16px;   /* SPRS score, section titles */\n}\n\n/* ouros — spacing, radii, borders, shadows\n   4px grid: 4/8/12/16/24/32 (spec-defense-ui-v2). Web sections add 48/64/120. */\n\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-section: 120px;      /* web section vertical padding */\n\n  --container-max: 1100px;     /* web content column */\n\n  /* Radii — exact site values */\n  --radius-sm: 6px;            /* bars, badges, small buttons */\n  --radius-md: 8px;            /* buttons, terminal blocks, callouts */\n  --radius-lg: 10px;           /* flow steps, stats */\n  --radius-xl: 12px;           /* feature cards */\n  --radius-2xl: 16px;          /* large cards (contact) */\n\n  /* Borders — 1px always; color does the work */\n  --border-w: 1px;\n\n  /* Shadows — glows only, never drop shadows */\n  --glow-green: 0 10px 30px rgba(34, 197, 94, 0.2);\n  --glow-green-soft: 0 0 20px rgba(34, 197, 94, 0.1);\n  --glow-cyan-soft: 0 0 20px rgba(34, 211, 238, 0.1);\n\n  /* Background grid texture (site body::before) */\n  --grid-size: 80px;\n}\n\n.theme-console {\n  /* Console radii (ouros-console theme.rs: 4/6/8) */\n  --radius-sm: 4px;\n  --radius-md: 6px;\n  --radius-lg: 8px;\n  --radius-xl: 8px;\n  --radius-2xl: 8px;\n}\n\n/* ouros — base element styles (minimal; tokens do the work) */\n\n* { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  background: var(--surface-page);\n  color: var(--text-body);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n}\n\na { color: var(--accent); text-decoration: none; }\na:hover { color: var(--text-1); }\n\ncode, pre, kbd, samp { font-family: var(--font-mono); }\n\n::selection { background: var(--green-dim); color: var(--text-1); }\n\n/* Background grid texture — apply .ouros-grid-bg to a positioned container */\n.ouros-grid-bg::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background:\n    linear-gradient(to bottom, var(--surface-page) 0%, transparent 30%, transparent 70%, var(--surface-page) 100%),\n    linear-gradient(90deg, var(--border-1) 1px, transparent 1px),\n    linear-gradient(var(--border-1) 1px, transparent 1px);\n  background-size: 100% 100%, var(--grid-size) var(--grid-size), var(--grid-size) var(--grid-size);\n  opacity: 0.4;\n  z-index: 0;\n  pointer-events: none;\n}\n\n<\u002Fstyle>\n<script src=\"6ef6a778-dcad-4278-b941-11e55b8449f7\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;height:100%}\n  body{background:#070a12;color:var(--text-1);font-family:var(--font-body);-webkit-font-smoothing:antialiased}\n  a{color:var(--accent);text-decoration:none} a:hover{color:var(--text-1)}\n  ::selection{background:rgba(0,224,255,.25)}\n  input,select,button,textarea{font-family:inherit;color:inherit}\n  *::-webkit-scrollbar{width:9px;height:9px}\n  *::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:5px}\n  *::-webkit-scrollbar-track{background:transparent}\n  @keyframes pr-flow{to{stroke-dashoffset:-30}}\n  @keyframes pr-pulse{50%{opacity:.35}}\n  @keyframes pr-bite{0%{transform:scale(1.9);opacity:.15}45%{opacity:1}100%{transform:scale(1)}}\n  @keyframes pr-compromise{0%{transform:scale(1.7)}100%{transform:scale(1)}}\n  @keyframes pr-alert{0%,100%{opacity:.25}50%{opacity:1}}\n  @keyframes pr-chipin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n  @keyframes pr-livepulse{0%,100%{opacity:.55}50%{opacity:1}}\n  @keyframes pr-crown{0%,100%{opacity:.5}50%{opacity:1}}\n  @keyframes pr-spin{to{transform:rotate(360deg)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"theme-console\" style=\"min-height:100vh;background:radial-gradient(1200px 700px at 82% -10%,rgba(255,68,68,.07),transparent 60%),radial-gradient(1100px 680px at 6% 112%,rgba(0,224,255,.06),transparent 58%),#070a12;color:var(--text-1);font-family:var(--font-body);display:flex;flex-direction:column\">\n\n  <!-- LIVE fire overlay -->\n  <sc-if value=\"{{ live }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;pointer-events:none;z-index:60;box-shadow:inset 0 0 0 2px var(--status-danger),inset 0 0 90px rgba(255,68,68,.22);animation:pr-livepulse 2.4s ease-in-out infinite\"><\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══ TOP BAR ══ -->\n  <div style=\"display:flex;align-items:center;gap:18px;padding:12px 22px;border-bottom:1px solid var(--border-1);background:rgba(10,14,26,.7);backdrop-filter:blur(10px)\">\n    <div style=\"display:flex;align-items:center;gap:11px;min-width:0\">\n      <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none\"><circle cx=\"12\" cy=\"12\" r=\"9\" stroke=\"var(--audit)\" stroke-width=\"2\" stroke-dasharray=\"46 8\" stroke-linecap=\"round\"><\u002Fcircle><path d=\"M12 3 l3 2.4 -3 2.4\" stroke=\"var(--audit)\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <div style=\"min-width:0\">\n        <div style=\"font-family:var(--font-mono);font-weight:700;font-size:15px;letter-spacing:-.01em;line-height:1\">{{ rangeName }}<span style=\"color:var(--audit)\">.<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-3);margin-top:3px\">{{ sub }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SIM / LIVE state — the unmistakable stakes indicator -->\n    <div style=\"margin-left:6px;display:flex;align-items:center;gap:0;border:1px solid var(--border-2);border-radius:7px;overflow:hidden;font-family:var(--font-mono)\">\n      <button onclick=\"{{ setSim }}\" style=\"{{ simBtnStyle }}\">SIM<\u002Fbutton>\n      <button onclick=\"{{ setLive }}\" style=\"{{ liveBtnStyle }}\">◉ LIVE<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"font-family:var(--font-mono);font-size:10px;color:var(--text-3);letter-spacing:.04em;max-width:230px;line-height:1.35\">{{ stakesNote }}<\u002Fdiv>\n\n    <div style=\"margin-left:auto;display:flex;align-items:center;gap:16px\">\n      <div style=\"text-align:right\">\n        <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3)\">Round<\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--text-1)\">{{ roundLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:30px;background:var(--border-1)\"><\u002Fdiv>\n      <div style=\"{{ turnPillStyle }}\">{{ turnLabel }}<\u002Fdiv>\n      <button onclick=\"{{ toggleArch }}\" title=\"Architecture &amp; contracts\" style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-2);background:transparent;border:1px solid var(--border-2);border-radius:6px;padding:7px 11px;cursor:pointer\">◆ spec<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- classification banner -->\n  <div style=\"height:22px;background:var(--cls-unclassified);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:1px;flex:none\">UNCLASSIFIED // FOUO — AUTHORIZED LAB USE ONLY<\u002Fdiv>\n\n  <!-- ══ SETUP BAR ══ -->\n  <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:11px 22px;border-bottom:1px solid var(--border-1);background:rgba(20,25,42,.4)\">\n    <span style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3)\">Mode<\u002Fspan>\n    <div style=\"display:flex;border:1px solid var(--border-2);border-radius:7px;overflow:hidden;font-family:var(--font-mono)\">\n      <button onclick=\"{{ setModeSpectate }}\" style=\"{{ mSpecStyle }}\">Spectate<\u002Fbutton>\n      <button onclick=\"{{ setMode1p }}\" style=\"{{ m1pStyle }}\">1-Player<\u002Fbutton>\n      <button onclick=\"{{ setMode2p }}\" style=\"{{ m2pStyle }}\">2-Player<\u002Fbutton>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ pickSide }}\" hint-placeholder-val=\"{{ false }}\">\n      <span style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);margin-left:4px\">Your side<\u002Fspan>\n      <div style=\"display:flex;border:1px solid var(--border-2);border-radius:7px;overflow:hidden;font-family:var(--font-mono)\">\n        <button onclick=\"{{ setSideRed }}\" style=\"{{ sideRedStyle }}\">◉ RED<\u002Fbutton>\n        <button onclick=\"{{ setSideBlue }}\" style=\"{{ sideBlueStyle }}\">◆ BLUE<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"width:1px;height:26px;background:var(--border-1)\"><\u002Fdiv>\n\n    <!-- model endpoint -->\n    <div style=\"display:flex;align-items:center;gap:8px;border:1px solid var(--border-1);border-radius:7px;padding:5px 9px;background:var(--bg-0)\">\n      <span style=\"width:8px;height:8px;border-radius:50%;background:{{ endpointDotColor }};box-shadow:0 0 6px {{ endpointDotColor }};flex:none\"><\u002Fspan>\n      <span style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);flex:none\">Model<\u002Fspan>\n      <input value=\"{{ endpointUrl }}\" oninput=\"{{ setEndpointUrl }}\" placeholder=\"http://host:11434/v1\" spellcheck=\"false\" style=\"width:190px;background:transparent;border:none;outline:none;font-family:var(--font-mono);font-size:11px;color:var(--text-1)\">\n      <span style=\"color:var(--text-3);font-family:var(--font-mono)\">/<\u002Fspan>\n      <input value=\"{{ endpointModel }}\" oninput=\"{{ setEndpointModel }}\" placeholder=\"model\" spellcheck=\"false\" style=\"width:96px;background:transparent;border:none;outline:none;font-family:var(--font-mono);font-size:11px;color:var(--accent)\">\n    <\u002Fdiv>\n\n    <div style=\"margin-left:auto;display:flex;align-items:center;gap:9px\">\n      <button onclick=\"{{ newGame }}\" style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--bg-0);background:var(--accent);border:none;border-radius:7px;padding:8px 15px;cursor:pointer;font-weight:700\">↻ New match<\u002Fbutton>\n      <button onclick=\"{{ resetRange }}\" style=\"{{ resetBtnStyle }}\">◉ Reset range<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ══ MAIN GRID ══ -->\n  <div style=\"flex:1;display:grid;grid-template-columns:minmax(0,1fr) 366px;grid-template-rows:auto auto;gap:16px;padding:16px 22px 26px;max-width:1560px;width:100%;margin:0 auto;align-items:start\">\n\n    <!-- BATTLEFIELD (row 1, col 1) -->\n    <section style=\"grid-column:1;grid-row:1;background:linear-gradient(180deg,var(--bg-1),#0c1120);border:1px solid var(--border-1);border-radius:14px;overflow:hidden;position:relative\">\n      <div style=\"display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border-1)\">\n        <span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-2)\">Battlefield<\u002Fspan>\n        <span style=\"font-family:var(--font-mono);font-size:9.5px;color:var(--text-3);letter-spacing:.04em\">corp.local · topology frozen<\u002Fspan>\n        <!-- eye / fog-of-war selector -->\n        <div style=\"margin-left:auto;display:flex;align-items:center;gap:9px\">\n          <span style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3)\">Seat view<\u002Fspan>\n          <sc-if value=\"{{ canToggleEye }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;border:1px solid var(--border-2);border-radius:7px;overflow:hidden;font-family:var(--font-mono)\">\n              <button onclick=\"{{ setEyeRef }}\" style=\"{{ eyeRefStyle }}\">◆ Referee<\u002Fbutton>\n              <button onclick=\"{{ setEyeRed }}\" style=\"{{ eyeRedStyle }}\">Red<\u002Fbutton>\n              <button onclick=\"{{ setEyeBlue }}\" style=\"{{ eyeBlueStyle }}\">Blue<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ eyeLocked }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"{{ eyeLockStyle }}\">{{ eyeLockLabel }}<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- column headers -->\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);padding:9px 14px 0;font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3)\">\n        <span>VLAN10 · attacker<\u002Fspan><span style=\"text-align:center\">VLAN20 · targets<\u002Fspan><span style=\"text-align:center\">VLAN30 · domain<\u002Fspan><span style=\"text-align:right\">VLAN40 · telemetry<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"position:relative;padding:4px 8px 6px\">\n        {{ battlefield }}\n      <\u002Fdiv>\n\n      <!-- fog legend for the current eye -->\n      <div style=\"display:flex;align-items:center;gap:9px;padding:8px 16px 13px;border-top:1px solid var(--border-1);font-family:var(--font-mono);font-size:10px;color:var(--text-3);line-height:1.4\">\n        <span style=\"width:9px;height:9px;border-radius:50%;background:{{ eyeTone }};box-shadow:0 0 7px {{ eyeTone }};flex:none\"><\u002Fspan>\n        <b style=\"color:{{ eyeTone }};font-weight:700;letter-spacing:.04em\">{{ eyeName }}<\u002Fb>\n        <span>{{ eyeDesc }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- RIGHT RAIL: scoreboard + timeline + objective flags (row 1, col 2) -->\n    <aside style=\"grid-column:2;grid-row:1;display:flex;flex-direction:column;gap:14px\">\n      <!-- scoreboard -->\n      <div style=\"background:var(--bg-1);border:1px solid var(--border-1);border-radius:14px;padding:14px 16px 16px;position:relative;overflow:hidden\">\n        <sc-if value=\"{{ showWinner }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"{{ winnerBannerStyle }}\">{{ winnerText }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-2);margin-bottom:12px\">Referee scoreboard<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px\">\n          <div style=\"text-align:center\">\n            <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--status-danger)\">◉ Red<\u002Fdiv>\n            <div style=\"font-family:var(--font-mono);font-size:44px;font-weight:800;line-height:1;color:var(--status-danger);text-shadow:0 0 20px rgba(255,68,68,.35)\">{{ redScore }}<\u002Fdiv>\n            <div style=\"font-family:var(--font-mono);font-size:9px;color:var(--text-3);margin-top:3px\">offense<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:var(--font-mono);font-size:12px;color:var(--text-3)\">vs<\u002Fdiv>\n          <div style=\"text-align:center\">\n            <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)\">◆ Blue<\u002Fdiv>\n            <div style=\"font-family:var(--font-mono);font-size:44px;font-weight:800;line-height:1;color:var(--accent);text-shadow:0 0 20px rgba(0,224,255,.35)\">{{ blueScore }}<\u002Fdiv>\n            <div style=\"font-family:var(--font-mono);font-size:9px;color:var(--text-3);margin-top:3px\">defense<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- round timeline -->\n        <div style=\"margin-top:14px;padding-top:12px;border-top:1px solid var(--border-1)\">\n          <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px\">Per-round deltas<\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-end;gap:5px;height:52px\">\n            <sc-for list=\"{{ timeline }}\" as=\"r\" hint-placeholder-count=\"6\">\n              <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:2px\" title=\"{{ r.tip }}\">\n                <div style=\"width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:40px;gap:2px\">\n                  <div style=\"height:{{ r.rh }}px;background:var(--status-danger);border-radius:2px;opacity:.85\"><\u002Fdiv>\n                  <div style=\"height:{{ r.bh }}px;background:var(--accent);border-radius:2px;opacity:.85\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-family:var(--font-mono);font-size:8px;color:var(--text-3)\">{{ r.n }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ noRounds }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-family:var(--font-mono);font-size:10px;color:var(--text-3);font-style:italic;align-self:center\">no rounds resolved yet<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- objective / battlefield flags (referee ground truth) -->\n      <div style=\"background:var(--bg-1);border:1px solid var(--border-1);border-radius:14px;padding:13px 16px 15px\">\n        <div style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-2);margin-bottom:11px\">Objective state <span style=\"color:var(--text-3);letter-spacing:0;text-transform:none;font-size:9px\">· bf{}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px\">\n          <sc-for list=\"{{ flags }}\" as=\"f\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;gap:8px;border:1px solid var(--border-1);border-radius:7px;padding:7px 9px;background:var(--bg-0)\">\n              <span style=\"width:8px;height:8px;border-radius:50%;flex:none;background:{{ f.color }};box-shadow:0 0 6px {{ f.color }}\"><\u002Fspan>\n              <div style=\"min-width:0\">\n                <div style=\"font-family:var(--font-mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ f.label }}<\u002Fdiv>\n                <div style=\"font-family:var(--font-mono);font-size:12px;font-weight:700;color:{{ f.color }}\">{{ f.val }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- PLAY-BY-PLAY FEED (row 2, col 1) -->\n    <section style=\"grid-column:1;grid-row:2;background:var(--bg-1);border:1px solid var(--border-1);border-radius:14px;display:flex;flex-direction:column;min-height:250px;max-height:340px\">\n      <div style=\"display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--border-1);flex:none\">\n        <span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-2)\">Play-by-play<\u002Fspan>\n        <span style=\"font-family:var(--font-mono);font-size:9.5px;color:var(--text-3)\">{{ feedScopeNote }}<\u002Fspan>\n        <span style=\"margin-left:auto;font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);display:flex;align-items:center;gap:6px\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--status-ok);box-shadow:0 0 6px var(--status-ok);animation:pr-pulse 1.6s infinite\"><\u002Fspan>live<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pr-scroll\" style=\"flex:1;overflow-y:auto;padding:6px 12px 12px\">\n        <sc-for list=\"{{ feed }}\" as=\"ln\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;align-items:flex-start;gap:10px;padding:8px 6px;border-bottom:1px solid rgba(255,255,255,.03);border-left:2px solid {{ ln.sideColor }};padding-left:11px;margin-bottom:2px;animation:pr-chipin .28s ease-out\">\n            <span style=\"font-family:var(--font-mono);font-size:9px;color:var(--text-3);flex:none;width:26px;padding-top:2px\">{{ ln.rnd }}<\u002Fspan>\n            <span style=\"{{ ln.badgeStyle }}\">{{ ln.badge }}<\u002Fspan>\n            <span style=\"font-family:var(--font-mono);font-size:11.5px;color:var(--text-2);line-height:1.5\">{{ ln.text }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ feedEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-family:var(--font-mono);font-size:11px;color:var(--text-3);font-style:italic;padding:14px 6px\">Awaiting first move. The referee narrates each turn here — badges reflect what this seat is allowed to know.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- COMMAND / HAND (row 2, col 2) -->\n    <aside style=\"grid-column:2;grid-row:2;background:linear-gradient(180deg,var(--bg-1),#0c1120);border:1px solid {{ commandBorder }};border-radius:14px;display:flex;flex-direction:column;min-height:250px;max-height:520px;position:relative;transition:border-color .3s\">\n      <div style=\"display:flex;align-items:center;gap:9px;padding:12px 15px;border-bottom:1px solid var(--border-1);flex:none\">\n        <span style=\"{{ commandDotStyle }}\"><\u002Fspan>\n        <span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-1);font-weight:700\">{{ handTitle }}<\u002Fspan>\n        <span style=\"margin-left:auto;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3)\">{{ handKicker }}<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"pr-scroll\" style=\"flex:1;overflow-y:auto;padding:12px 13px 14px\">\n        <!-- HUMAN HAND -->\n        <sc-if value=\"{{ showHand }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family:var(--font-mono);font-size:10px;color:var(--text-3);line-height:1.45;margin-bottom:11px\">{{ handNote }}<\u002Fdiv>\n          <sc-for list=\"{{ hand }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div style=\"{{ c.cardStyle }}\">\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\">\n                <span style=\"{{ c.tierStyle }}\">{{ c.tierGlyph }} {{ c.tier }}<\u002Fspan>\n                <span style=\"margin-left:auto;font-family:var(--font-mono);font-size:9px;color:var(--text-3)\">{{ c.technique }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-family:var(--font-mono);font-size:13px;font-weight:700;color:{{ c.nameColor }};margin-bottom:4px\">{{ c.name }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:var(--text-2);line-height:1.5;margin-bottom:9px\">{{ c.summary }}<\u002Fdiv>\n              <!-- params -->\n              <sc-for list=\"{{ c.params }}\" as=\"p\" hint-placeholder-count=\"1\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\">\n                  <span style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);width:78px;flex:none\">{{ p.label }}<\u002Fspan>\n                  <sc-if value=\"{{ p.isEnum }}\" hint-placeholder-val=\"{{ true }}\">\n                    <select value=\"{{ p.value }}\" onchange=\"{{ p.onChange }}\" disabled=\"{{ c.locked }}\" style=\"flex:1;background:var(--bg-0);border:1px solid var(--border-2);border-radius:6px;padding:6px 8px;font-family:var(--font-mono);font-size:11px;color:var(--text-1);cursor:pointer\">\n                      <sc-for list=\"{{ p.options }}\" as=\"o\" hint-placeholder-count=\"2\"><option value=\"{{ o }}\">{{ o }}<\u002Foption><\u002Fsc-for>\n                    <\u002Fselect>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ p.isFixed }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"flex:1;font-family:var(--font-mono);font-size:11px;color:var(--gate);border:1px solid var(--border-1);border-radius:6px;padding:6px 8px;background:var(--bg-0)\">{{ p.value }} · locked<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ c.legal }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ c.play }}\" style=\"{{ c.playStyle }}\">{{ c.playLabel }}<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ c.illegal }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-family:var(--font-mono);font-size:10px;color:var(--text-3);border:1px dashed var(--border-2);border-radius:6px;padding:7px 9px;line-height:1.4\">✕ {{ c.reason }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsc-if>\n\n        <!-- AUTONOMOUS / AI panel -->\n        <sc-if value=\"{{ showAuto }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px 8px;gap:14px\">\n            <div style=\"{{ autoDotStyle }}\"><\u002Fdiv>\n            <div>\n              <div style=\"font-family:var(--font-mono);font-size:12px;font-weight:700;color:{{ autoColor }};letter-spacing:.04em\">{{ autoTitle }}<\u002Fdiv>\n              <div style=\"font-family:var(--font-mono);font-size:10px;color:var(--text-3);line-height:1.5;margin-top:6px;max-width:250px\">{{ autoNote }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:9px;flex-wrap:wrap;justify-content:center\">\n              <button onclick=\"{{ togglePause }}\" style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-1);background:transparent;border:1px solid var(--border-2);border-radius:7px;padding:8px 14px;cursor:pointer\">{{ pauseLabel }}<\u002Fbutton>\n              <button onclick=\"{{ stepRound }}\" style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--bg-0);background:{{ autoColor }};border:none;border-radius:7px;padding:8px 14px;cursor:pointer;font-weight:700\">Step ▸<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- FINISHED -->\n        <sc-if value=\"{{ finished }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:14px 8px;gap:12px\">\n            <div style=\"font-family:var(--font-mono);font-size:13px;font-weight:800;color:{{ winnerTone }};letter-spacing:.05em\">{{ winnerText }}<\u002Fdiv>\n            <div style=\"font-family:var(--font-mono);font-size:10.5px;color:var(--text-2);line-height:1.55;max-width:260px\">{{ finishNote }}<\u002Fdiv>\n            <button onclick=\"{{ newGame }}\" style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--bg-0);background:var(--accent);border:none;border-radius:7px;padding:9px 16px;cursor:pointer;font-weight:700\">↻ Run it back<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n\n  <!-- ══ LIVE CONFIRM MODAL ══ -->\n  <sc-if value=\"{{ pendingLive }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:80;background:rgba(4,6,12,.8);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px\">\n      <div style=\"width:440px;max-width:100%;background:var(--bg-1);border:1px solid var(--status-danger);border-radius:14px;box-shadow:0 0 60px rgba(255,68,68,.25);overflow:hidden\">\n        <div style=\"padding:11px 18px;background:var(--status-danger);color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase\">◉ LIVE FIRE — real hardware<\u002Fdiv>\n        <div style=\"padding:20px 18px\">\n          <div style=\"font-family:var(--font-mono);font-size:13px;color:var(--text-1);line-height:1.6;margin-bottom:8px\">{{ pendingText }}<\u002Fdiv>\n          <div style=\"font-family:var(--font-mono);font-size:10.5px;color:var(--text-3);line-height:1.55\">This runs the operation against the live range over SSH via <span style=\"color:var(--audit)\">POST /api/move<\u002Fspan>. Effects are real and recorded to the audit chain.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:20px;justify-content:flex-end\">\n            <button onclick=\"{{ cancelLive }}\" style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-1);background:transparent;border:1px solid var(--border-2);border-radius:7px;padding:9px 16px;cursor:pointer\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ confirmLive }}\" style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:var(--status-danger);border:none;border-radius:7px;padding:9px 16px;cursor:pointer;font-weight:700\">◉ Fire on range<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══ 2P HAND-OFF GATE ══ -->\n  <sc-if value=\"{{ showHandoff }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:85;background:rgba(4,6,12,.94);display:flex;align-items:center;justify-content:center;padding:24px\">\n      <div style=\"text-align:center;max-width:420px\">\n        <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px\">Fog of war · hot-seat<\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:26px;font-weight:800;color:{{ handoffColor }};margin-bottom:8px;text-shadow:0 0 24px {{ handoffColor }}\">{{ handoffTitle }}<\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:12px;color:var(--text-2);line-height:1.6;margin-bottom:24px\">{{ handoffNote }}<\u002Fdiv>\n        <button onclick=\"{{ revealHandoff }}\" style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--bg-0);background:{{ handoffColor }};border:none;border-radius:8px;padding:12px 26px;cursor:pointer;font-weight:700\">I am {{ handoffSide }} — reveal my view<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══ ARCHITECTURE / CONTRACTS OVERLAY ══ -->\n  <sc-if value=\"{{ showArch }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:90;background:rgba(4,6,12,.82);backdrop-filter:blur(5px);display:flex;justify-content:flex-end\">\n      <div class=\"pr-scroll\" style=\"width:640px;max-width:100%;height:100%;overflow-y:auto;background:var(--bg-1);border-left:1px solid var(--border-2);padding:22px 26px 40px\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:6px\">\n          <span style=\"font-family:var(--font-mono);font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--text-1)\">Component &amp; state map<\u002Fspan>\n          <button onclick=\"{{ toggleArch }}\" style=\"margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text-2);background:transparent;border:1px solid var(--border-2);border-radius:6px;padding:6px 12px;cursor:pointer\">✕ close<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:10.5px;color:var(--text-3);line-height:1.6;margin-bottom:20px\">This prototype doubles as the architecture spec. Everything below is mock-driven today, but each surface binds to the real contract noted — swap the mock engine for the SSE/endpoints and the UI is unchanged.<\u002Fdiv>\n\n        <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--audit);margin:0 0 10px\">Components → owned state → binding<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:24px\">\n          <sc-for list=\"{{ archComponents }}\" as=\"a\" hint-placeholder-count=\"7\">\n            <div style=\"border:1px solid var(--border-1);border-left:2px solid var(--audit);border-radius:6px;padding:10px 12px;background:var(--bg-0)\">\n              <div style=\"font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--text-1)\">{{ a.name }}<\u002Fdiv>\n              <div style=\"font-family:var(--font-mono);font-size:10.5px;color:var(--text-2);line-height:1.5;margin-top:4px\"><span style=\"color:var(--text-3)\">owns<\u002Fspan> {{ a.owns }}<\u002Fdiv>\n              <div style=\"font-family:var(--font-mono);font-size:10.5px;color:var(--text-2);line-height:1.5;margin-top:2px\"><span style=\"color:var(--text-3)\">binds<\u002Fspan> {{ a.binds }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:0 0 10px\">API contracts<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ archContracts }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <div style=\"border:1px solid var(--border-1);border-radius:6px;padding:11px 13px;background:var(--bg-0)\">\n              <div style=\"font-family:var(--font-mono);font-size:11.5px;font-weight:700;color:var(--accent)\">{{ c.route }}<\u002Fdiv>\n              <div style=\"font-family:var(--font-mono);font-size:10.5px;color:var(--text-2);line-height:1.55;margin-top:5px;white-space:pre-wrap\">{{ c.shape }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;startMode&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;spectate&quot;, &quot;1p&quot;, &quot;2p&quot;], &quot;default&quot;: &quot;spectate&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Match&quot; },\n  &quot;startSide&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Red&quot;, &quot;Blue&quot;], &quot;default&quot;: &quot;Blue&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Match&quot; },\n  &quot;liveByDefault&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Match&quot; },\n  &quot;autoAdvance&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Tempo&quot; },\n  &quot;tempoMs&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;min&quot;: 800, &quot;max&quot;: 5000, &quot;step&quot;: 100, &quot;default&quot;: 2500, &quot;unit&quot;: &quot;ms&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Tempo&quot; }\n}\">\nclass Component extends DCLogic {\n  // ── catalog: the /api/catalog cards contract ──────────────────\n  catalog() {\n    return [\n      { id:'recon', side:'Red', technique:'T1046 · Service Recon', tier:'READ_ONLY',\n        summary:'Sweep a target for live services and SPNs. Quiet — but a tripwire can still catch it.',\n        params_schema:[{ key:'target', label:'Target', type:'enum', options:['ws01','ws02','srv01'] }] },\n      { id:'kerberoast', side:'Red', technique:'T1558.003 · Kerberoast', tier:'MUTATING',\n        summary:'Request a service ticket for an SPN account and crack it offline for cleartext creds.',\n        params_schema:[{ key:'account', label:'SPN acct', type:'enum', options:['svc-sql','svc-web','svc-backup'] }] },\n      { id:'asrep', side:'Red', technique:'T1558.004 · AS-REP Roast', tier:'MUTATING',\n        summary:'Harvest AS-REP hashes from accounts that lack Kerberos pre-authentication.',\n        params_schema:[{ key:'account', label:' , label:'Account', type:'enum', options:['krbtgt','svc-sql','all service accts'] }] },\n      { id:'detect', side:'Blue', technique:'M1054 · Deploy Detection', tier:'READ_ONLY',\n        summary:'Arm a honeytoken or SIEM analytic to catch the next move before it lands.',\n        params_schema:[{ key:'type', label:'Detection', type:'enum', options:['honeytoken SPN','DCSync canary','Kerberoast analytic','AS-REP analytic'] },{ key:'host', label:'Sensor', type:'enum', options:['srv01','dc01','all hosts'] }] },\n      { id:'contain', side:'Blue', technique:'M1030 · Contain Host', tier:'DESTRUCTIVE',\n        summary:'Network-isolate a suspect host and sever its pivot. This is the bite.',\n        params_schema:[{ key:'host', label:'Host', type:'enum', options:['ws01','ws02','srv01'] }] },\n    ];\n  }\n  card(id){ return this.catalog().find(c=>c.id===id); }\n\n  // ── frozen battlefield ────────────────────────────────────────\n  buildHosts(){\n    return [\n      { id:'kali',  label:'kali',  ip:'10.20.10.5',  col:0, y:200, role:'attacker', red:'owned', det:'none' },\n      { id:'ws01',  label:'ws01',  ip:'10.20.20.11', col:1, y:96,  role:'workstation', red:'clean', det:'none' },\n      { id:'srv01', label:'srv01', ip:'10.20.20.20', col:1, y:200, role:'server', spn:true, red:'clean', det:'none' },\n      { id:'ws02',  label:'ws02',  ip:'10.20.20.12', col:1, y:304, role:'workstation', red:'clean', det:'none' },\n      { id:'dc01',  label:'dc01',  ip:'10.20.30.10', col:2, y:200, role:'dc', crown:true, red:'clean', det:'none' },\n      { id:'siem',  label:'siem',  ip:'10.20.40.10', col:3, y:118, role:'siem', red:'na', det:'none' },\n    ];\n  }\n  edgesBase(){\n    return [\n      { id:'e1', a:'kali', b:'ws01',  kind:'route' },\n      { id:'e2', a:'kali', b:'ws02',  kind:'route' },\n      { id:'e3', a:'ws01', b:'srv01', kind:'pivot' },\n      { id:'e4', a:'ws02', b:'srv01', kind:'pivot' },\n      { id:'e5', a:'srv01',b:'dc01',  kind:'pivot' },\n      { id:'t1', a:'ws01', b d]; return (p&&p[key]!==undefined)?p[key]:fallback; }\n  setParam(cardId, key, val){ this.setState(s=>({ params:{ ...s.params, [cardId]:{ ...(s.params[cardId]||{}), [key]:val } } })); }\n  cardParams(cardId){ const c=this.card(cardId); const out={}; (c.params_schema||[]).forEach(p=>{ out[p.key]=p.type==='fixed'?p.value:this.paramVal(cardId,p.key,p.options[0]); }); return out; }\n\n  // ── legality (evolves with defenses; enforces fog for blue) ────\n  legalFor(side){\n    const s=this.state, d=s.defense;\n    return this.catalog().filter(c=>c.side===side).map(c=>{\n      let legal=true, reason='';\n      if(side==='Red'){\n        if(c.id==='kerberoast' && d.aes){ legal=false; reason='AES enforced — no RC4 tickets to crack.'; }\n        if(c.id==='asrep' && d.preauth){ legal=false; reason='Pre-auth enforced — no AS-REP to harvest.'; }\n        if(c.id==='dcsync'){\n          if(d.dcsyncRevoked && s.hosts.find(h=>h.id==='srv01').red==='clean'){ legal=false; reason='DS-Replication rights revoked — no principal to abuse.'; }\n          else if(!s.redCred || s.hosts.find(h=>h.id==='srv01').red==='clean'){ legal=false; reason='Need a credentialed foothold on srv01 first.'; }\n        }\n        if(c.id==='golden'){\n          if(!s.dcsyncDone){ legal=false; reason='Need the krbtgt hash — run DCSync first.'; }\n          else if(d.krbtgtRotations>=2){ legal=false; reason='krbtgt double-rotated — forged tickets are void.'; }\n        }\n      } else {\n        if(c.id==='aes' && d.aes){ legal=false; reason='AES already enforced.'; }\n        if(c.id==='preauth' && d.preauth){ legal=false; reason='Pre-auth already enforced.'; }\n        if(c.id==='revoke' && d.dcsyncRevoked){ legal=false; reason='DCSync rights already revoked.'; }\n        if(c.id==='contain'){\n          const det=s.hosts.filter(h=>h.det==='detected');\n          if(!det.length){ legal=false; reason='Nothing detected to contain — you can only bite what telemetry surfaced.'; }\n        }\n      }\n      return { ...c, legal, reason };\n    });\n  }\n\n  // ── feed ──────────────────────────────────────────────────────\n  addFeed(f, vis, side, badge, text){ f.push({ id:++this._fid, vis, side, badge, text }); }\n\n  // ── resolve a move ────────────────────────────────────────────\n  playMove(side, cardId, params, isAI){\n    const s=this.state;\n    if(s.finished || side!==s.turn) return;\n    // LIVE gate for human moves\n    if(s.live && !isAI && !this._confirmed){\n      const c=this.card(cardId);\n      const tgt=params.target||params.host||params.account||params.principal||params.scope||'range';\n      this.setState({ pendingLive:{ side, cardId, params, text:`Fire ${c.technique.split(' · ')[1]||c.technique} against ${tgt}?` } });\n      return;\n    }\n    this._confirmed=false;\n    this.resolveAndAdvance(side, cardId, params);\n  }\n\n  resolveAndAdvance(side, cardId, params){\n    const s=this.state;\n    const hosts=s.hosts.map(h=>({...h}));\n    const H=id=>hosts.find(h=>h.id===id);\n    const d={ ...s.defense, detections:[...s.defense.detections] };\n    const st={ redCred:s.redCred, bloodhound:s.bloodhound, dcsyncDone:s.dcsyncDone, dcOwned:s.dcOwned,\n      alerts:s.alerts, honeytokens:s.honeytokens, blueWatching:s.blueWatching,\n      blueSeen:[...s.blueSeen], kc:{...s.kc} };\n    this._fid=s.feedId;\n    const feed=[...s.feed];\n    let dR=0, dB=0; const hot=[]; const fx={};\n    const armed=t=>d.detections.some(x=>x.type===t);\n    const watching=()=>d.detections.some(x=>/analytic|canary/.test(x.type));\n    const c=this.card(cardId);\n    const tech=c.technique.split(' · ')[1]||c.id;\n\n    if(side==='Red'){\n      st.kc[cardId]=true;\n      if(cardId==='recon'){\n        const t=params.target||'ws01'; st.recon=true;\n        dR+=2;\n        this.addFeed(feed,['Red','referee'],'Red','STEALTH',`recon ${t} — ${tech}: services + SPNs mapped, no alerts observed.`);\n      }\n      else if(cardId==='kerberoast'){\n        const acct=params.account||'svc-sql'
