('e1'); fx.ws01='compromise';\n          this.addFeed(feed,['Red','referee'],'Red','STEALTH',`AS-REP roast ${acct} — hash captured, cracked offline. Quiet.`);\n        }\n      }\n      else if(cardId==='bloodhound'){\n        st.bloodhound=true;\n        if(watching()){\n          dR+=2; dB+=4; st.alerts++; st.blueSeen.push('bloodhound');\n          this.addFeed(feed,['Red','referee'],'Red','INTEL',`BloodHound (${params.scope}) — attack paths to Domain Admin mapped.`);\n          this.addFeed(feed,['Blue','referee'],'Blue','DETECTED',`SharpHound signature — mass LDAP enumeration from ws01. Noisy collection seen.`);\n        } else {\n          dR+=4;\n          this.addFeed(feed,['Red','referee'],'Red','STEALTH',`BloodHound (${params.scope}) — DA path mapped: srv01 → dc01. Collection unseen.`);\n        }\n      }\n      else if(cardId==='dcsync'){\n        const canary=armed('DCSync canary');\n        if(canary){\n          dB+=14; st.alerts++; st.blueSeen.push('dcsync'); H('dc01').det='detected'; fx.dc01='alert';\n          this.addFeed(feed,['Red'],'Red','INTEL',`DCSync dc01 — replication request rejected / flagged.`);\n          this.addFeed(feed,['Blue','referee'],'Blue','HONEYPOT',`DCSync canary tripped — DS-Replication from a non-DC principal. Caught pre-loot.`);\n        } else if(watching()){\n          dR+=6; dB+=6; st.dcsyncDone=true; st.alerts++; st.blueSeen.push('dcsync'); H('dc01').red='compromised'; H('dc01').det='detected'; hot.push('e5'); fx.dc01='compromise';\n          this.addFeed(feed,['Red','referee'],'Red','STEALTH',`DCSync dc01 — krbtgt + admin hashes replicated.`);\n          this.addFeed(feed,['Blue','referee'],'Blue','DETECTED',`Event 4662 — DS-Replication-Get-Changes by a non-DC. dc01 compromise confirmed.`);\n        } else {\n          dR+=12; st.dcsyncDone=true; H('dc01').red='compromised'; hot.push('e5'); fx.dc01='compromise';\n          this.addFeed(feed,['Red','referee'],'Red','STEALTH',`DCSync dc01 — krbtgt hash exfiltrated. Directory secrets in hand, no alert.`);\n        }\n      }\n      else if(cardId==='golden'){\n        dR+=25; st.dcOwned=true; H('dc01').red='owned'; hot.push('e5'); fx.dc01='compromise';\n        this.addFeed(feed,['Red','referee'],'Red','OBJECTIVE',`Golden ticket forged — Domain Admin on dc01. Crown taken.`);\n        if(watching()){ dB+=6; this.addFeed(feed,['Blue','referee'],'Blue','DETECTED',`Anomalous TGT (mismatched lifetime) presented to dc01 — too late to stop it.`); }\n      }\n    } else {\n      // ── BLUE ──\n      if(cardId==='aes'){ d.aes=true; dB+=3; this.addFeed(feed,['Blue','referee'],'Blue','HARDEN',`Enforce AES (${params.scope}) — RC4 disabled domain-wide. Kerberoast neutered.`); }\n      else if(cardId==='preauth'){ d.preauth=true; dB+=3; this.addFeed(feed,['Blue','referee'],'Blue','HARDEN',`Enforce pre-auth (${params.scope}) — AS-REP roasting is now impossible.`); }\n      else if(cardId==='revoke'){ d.dcsyncRevoked=true; dB+=4; this.addFeed(feed,['Blue','referee'],'Blue','HARDEN',`Revoke DCSync (${params.principal}) — replication rights stripped from non-DCs.`); }\n      else if(cardId==='rotate'){\n        const acct=params.account||'krbtgt';\n        if(acct==='krbtgt'||acct==='all service accts'){\n          d.krbtgtRotations++;\n          if(d.krbtgtRotations>=2){ dB+=6; this.addFeed(feed,['Blue','referee'],'Blue','CONTAINED',`Second krbtgt rotation — every forged golden ticket is now void.`); }\n          else { dB+=4; this.addFeed(feed,['Blue','referee'],'Blue','HARDEN',`krbtgt rotated (1/2) — one more rotation voids stolen tickets.`); }\n        } else { dB+=4; if(st.redCred && H('srv01').red==='compromised'){ H('srv01').red='clean'; } this.addFeed(feed,['Blue','referee'],'Blue','CONTAINED',`Reset ${acct} — stolen service credentials revoked.`); }\n      }\n      else if(cardId==='detect'){\n        d.detections.push({ type:params.type, host:params.host }); st.blueWatching=true;\n        if(/honeytoken/.test(params.type)) st.honeytokens++;\n        dB+=3; fx.siem='alert';\n        this.addFeed(feed,['Blue','referee'],'Blue','HARDEN',`Deploy ${params.type} on ${params.host} — sensor armed, watching for the next move.`);\n      }\n      else if(cardId==='contain'){\n        const host=params.host; const h=H(host);\n        if(h && h.det==='detected'){\n          h.det='contained'; dB+=10; fx[host]='bite';\n          const wasFoothold = h.red==='compromised'||h.red==='owned';\n          if(wasFoothold){ dB+=5; }\n          this.addFeed(feed,['Blue','referee'],'Blue','CONTAINED',`Contain ${host} — network-isolated, pivot severed. The bite lands.`);\n          if(wasFoothold) this.addFeed(feed,['Red'],'Red','INTEL',`lost access to ${host} — connection dropped, route cold.`);\n        }\n      }\n    }\n\n    // apply\n    Object.assign(st, {});\n    const ns={\n      hosts, defense:d, hotEdges:hot, fx,\n      redCred:st.redCred, bloodhound:st.bloodhound, dcsyncDone:st.dcsyncDone, dcOwned:st.dcOwned,\n      alerts:st.alerts, honeytokens:st.honeytokens, blueWatching:st.blueWatching,\n      blueSeen:st.blueSeen, kc:st.kc,\n      redScore:s.redScore+dR, blueScore:s.blueScore+dB,\n      feed:feed.slice(-60), feedId:this._fid,\n      curRound:{ red:s.curRound.red+dR, blue:s.curRound.blue+dB },\n    };\n\n    // advance turn / round\n    let { round, turn, rounds, maxRounds } = s;\n    if(turn==='Red'){ ns.turn='Blue'; }\n    else {\n      rounds=[...rounds, { n:round, red:ns.curRound.red, blue:ns.curRound.blue }];\n      ns.rounds=rounds; ns.curRound={ red:0, blue:0 };\n      round=round+1; ns.turn='Red'; ns.round=round;\n    }\n\n    // win check\n    if(ns.dcOwned){ ns.finished=true; ns.winner='Red'; }\n    else if((ns.round||round)>maxRounds){ ns.finished=true; ns.winner='Blue'; ns.blueScore+=12; }\n\n    // 2p hand-off between turns\n    const nextTurn = ns.turn!==undefined?ns.turn:turn;\n    if(s.mode==='2p' && !ns.finished){ ns.showHandoff=true; ns.handoffSide=nextTurn; ns.eye=nextTurn; }\n\n    this.setState(ns, ()=>{ this.armFxClear(); this.scheduleAI(); });\n  }\n\n  armFxClear(){ clearTimeout(this._fx); this._fx=setTimeout(()=>{ if(this._alive) this.setState({ hotEdges:[], fx:{} }); }, 1700); }\n  // edges on the compromise path from the attacker to each owned/compromised host (severed hosts drop out)\n  compromisedEdges(){\n    const s=this.state, set=new Set();\n    const paths={ ws01:['e1'], ws02:['e2'], srv01:['e1','e3'], dc01:['e1','e3','e5'] };\n    s.hosts.forEach(hh=>{ if((hh.red==='compromised'||hh.red==='owned') && hh.det!=='contained' && paths[hh.id]) paths[hh.id].forEach(e=>set.add(e)); });\n    return set;\n  }\n\n  // ── AI heuristics ─────────────────────────────────────────────\n  aiPick(side){\n    const legal=this.legalFor(side).filter(c=>c.legal);\n    if(!legal.length) return null;\n    const has=id=>legal.find(c=>c.id===id);\n    const s=this.state;\n    const dp=c=>this.cardParams(c.id);\n    const rnd=(a)=>a[Math.floor(Math.random()*a.length)];\n    if(side==='Red'){\n      // climb the chain honoring prerequisites: recon -> creds -> map -> dcsync -> golden\n      const pick=(id,extra)=>({ id, params:{ ...this.cardParams(id), ...(extra||{}) } });\n      const ker=()=>pick('kerberoast',{ account:rnd(['svc-sql','svc-web','svc-backup']) });\n      const asr=()=>pick('asrep',{ account:rnd(['svc-legacy','jdoe','helpdesk']) });\n      if(has('golden')) return pick('golden');\n      if(has('dcsync')) return pick('dcsync');\n      if(!s.kc.recon && has('recon')) return pick('recon',{ target:'srv01' });\n      if(!s.redCred && has('kerberoast')) return ker();\n      if(!s.redCred && has('asrep')) return asr();\n      if(!s.bloodhound && has('bloodhound')) return pick('bloodhound',{ scope:'full domain' });\n      if(has('kerberoast')) return ker();\n      if(has('asrep')) return asr();\n      if(has('bloodhound')) return pick('bloodhound',{ scope:'targeted' });\n      if(has('recon')) return pick('recon',{ target:'srv01' });\n      return { id:legal[0].id, params:dp(legal[0]) };\n    } else {\n      // pitbull: bite what telemetry surfaced, recover from what it saw, ambush early, harden late.\n      const r=s.round, det=s.defense.detections.length;\n      const detHost=s.hosts.find(h=>h.det==='detected');\n      if(detHost && has('contain')) return { id:'contain', params:{ host:detHost.id } };            // the bite\n      if(s.blueSeen.includes('dcsync') && s.defense.krbtgtRotations<2 && has('rotate')) return { id:'rotate', params:{ account:'krbtgt' } };\n      if(s.blueSeen.includes('kerberoast') && has('aes')) return { id:'aes', params:{ scope:'corp.local domain' } };\n      if(s.blueSeen.includes('asrep') && has('preauth')) return { id:'preauth', params:{ scope:'corp.local domain' } };\n      if(s.blueSeen.includes('bloodhound') && has('revoke')) return { id:'revoke', params:{ principal:'all non-DC' } };\n      if(det===0 && has('detect')){ const t=rnd(['DCSync canary','honeytoken SPN']); return { id:'detect', params:{ type:t, host: t==='DCSync canary'?'dc01':'srv01' } }; }\n      if(det===1 && has('detect')){ const t=s.defense.detections[0].type==='DCSync canary'?'honeytoken SPN':'DCSync canary'; return { id:'detect', params:{ type:t, host: t==='DCSync canary'?'dc01':'srv01' } }; }\n      if(r>=3){\n        if(has('revoke')) return { id:'revoke', params:{ principal:'all non-DC' } };\n        if(has('aes')) return { id:'aes', params:{ scope:'corp.local domain' } };\n        if(has('preauth')) return { id:'preauth', params:{ scope:'corp.local domain' } };\n      }\n      if(has('detect')) return { id:'detect', params:{ type:'Kerberoast analytic', host:'all hosts' } };\n      if(has('rotate')) return { id:'rotate', params:{ account:'krbtgt' } };\n      return { id:legal[0].id, params:dp(legal[0]) };\n    }\n  }\n  actorIsHuman(){ const s=this.state; if(s.mode==='spectate') return false; if(s.mode==='2p') return true; return s.turn===s.side; }\n  scheduleAI(){\n    clearTimeout(this._t);\n    const s=this.state;\n    if(!this._alive||s.finished||s.pendingLive||s.showHandoff||s.showArch) return;\n    if(this.actorIsHuman()) return;\n    if(s.paused||!this.autoAdvance()) return;\n    this._t=setTimeout(()=>this.aiStep(), this.tempoMs());\n  }\n  aiStep(){ const s=this.state; if(s.finished||this.actorIsHuman()) return; const pick=this.aiPick(s.turn); if(pick) this.resolveAndAdvance(s.turn, pick.id, pick.params); }\n\n  maybeHandoff(){ const s=this.state; if(s.mode==='2p'){ this.setState({ showHandoff:true, handoffSide:s.turn, eye:s.turn }); } }\n\n  // ── controls ──────────────────────────────────────────────────\n  reset(mode, side, live){ clearTimeout(this._t); clearTimeout(this._fx); this.setState(this.freshState(mode, side, live), ()=>{ this.maybeHandoff(); this.scheduleAI(); }); }\n  setMode(mode){ const side=this.state.side; this.reset(mode, side, this.state.live); }\n  setSide(side){ this.reset(this.state.mode, side, this.state.live); }\n  setLive(v){ this.setState({ live:v, pendingLive:null }, ()=>this.scheduleAI()); }\n  setEye(eye){ if(this.state.mode==='spectate') this.setState({ eye }); }\n  newGame(){ this.reset(this.state.mode, this.state.side, this.state.live); }\n  resetRange(){ this.reset(this.state.mode, this.state.side, this.state.live); }\n  togglePause(){ this.setState(s=>({ paused:!s.paused }), ()=>this.scheduleAI()); }\n  stepRound(){ const s=this.state; if(s.finished||this.actorIsHuman()) return; const pick=this.aiPick(s.turn); if(pick) this.resolveAndAdvance(s.turn, pick.id, pick.params); }\n  toggleArch(){ this.setState(s=>({ showArch:!s.showArch }), ()=>this.scheduleAI()); }\n  confirmLive(){ const p=this.state.pendingLive; if(!p) return; this._confirmed=true; this.setState({ pendingLive:null }, ()=>{ this.resolveAndAdvance(p.side, p.cardId, p.params); }); }\n  cancelLive(){ this.setState({ pendingLive:null }); }\n  revealHandoff(){ this.setState({ showHandoff:false }, ()=>this.scheduleAI()); }\n\n  // ── battlefield render (fog-aware) ────────────────────────────\n  renderBattlefield(){\n    const h=React.createElement, s=this.state, eye=s.eye;\n    const RED='#ff4444', BLUE='#00e0ff', AMBER='#ffa500', PURP='#a78bfa', GOLD='#ffd700', BORDER='#3c4a6a', SURF='#141c30', DIM='#5a6a8a';\n    const showTele = eye!=='Red';\n    const els=[];\n    // VLAN column bands — structure the battlefield even at rest\n    const bands=[\n      { x:120, w:150, fill:'rgba(255,68,68,.04)',  stroke:'rgba(255,68,68,.16)' },\n      { x:400, w:206, fill:'rgba(255,255,255,.012)',stroke:'#28324c' },\n      { x:660, w:150, fill:'rgba(255,215,0,.045)',  stroke:'rgba(255,215,0,.18)' },\n      { x:900, w:150, fill:'rgba(167,139,250,.045)',stroke:'rgba(167,139,250,.18)' },\n    ];\n    bands.forEach((b,i)=>{ if(i===3 && !showTele) return; els.push(h('rect',{ key:'band'+i, x:b.x-b.w/2, y:44, width:b.w, height:322, rx:12, fill:b.fill, stroke:b.stroke, strokeWidth:1, style:{ transition:'opacity .3s' } })); });\n    // edges\n    const compSet=this.compromisedEdges();\n    this.edgesBase().forEach(e=>{\n      if(e.kind==='tele' && !showTele) return;\n      const [ax,ay]=this.xy(e.a), [bx,by]=this.xy(e.b);\n      const A=s.hosts.find(x=>x.id===e.a), B=s.hosts.find(x=>x.id===e.b);\n      const flash=s.hotEdges.includes(e.id);\n      const severed=(A&&A.det==='contained')||(B&&B.det==='contained');\n      // ignited = on the compromise path to an owned host (persistent), or a fresh-move burst — hidden from Blue (fog)\n      const ignited=(eye!=='Blue') && e.kind!=='tele' && (compSet.has(e.id) || flash);\n      let stroke=BORDER, dash='', w=1.6, anim='', op=0.85;\n      if(e.kind==='tele'){ stroke=PURP; dash='1 7'; w=1.2; op=0.45; if(s.alerts>0&&eye!=='Red'){ anim='pr-alert 1.8s ease-in-out infinite'; op=0.7; } }\n      else if(e.kind==='pivot'){ stroke=GOLD; dash='3 6'; w=1.5; op=0.55; }\n      else { stroke=BLUE; dash=''; w=1.4; op=0.4; }\n      if(severed && eye!=='Red'){ stroke=DIM; dash='2 5'; op=0.3; }\n      if(ignited){ stroke=RED; dash='6 9'; w=2.4; anim='pr-flow .8s linear infinite'; op=1; }\n      els.push(h('line',{ key:e.id, x1:ax,y1:ay,x2:bx,y2:by, stroke, strokeWidth:w, strokeDasharray:dash, strokeLinecap:'round', style:{ opacity:op, animation:anim, transition:'stroke .4s, opacity .4s' } }));\n      // traveling compromise packet flowing attacker -> target along the ignited edge\n      if(ignited){\n        const pathStr=`M${ax},${ay} L${bx},${by}`;\n        els.push(h('circle',{ key:e.id+'-halo', r:9, fill:'rgba(255,68,68,.28)' },\n          h('animateMotion',{ dur:'0.95s', repeatCount:'indefinite', path:pathStr })));\n        els.push(h('circle',{ key:e.id+'-pkt', r:4, fill:'#ff6472', style:{ filter:'drop-shadow(0 0 8px #ff4444)' } },\n          h('animateMotion',{ dur:'0.95s', repeatCount:'indefinite', path:pathStr })));\n      }\n    });\n    // nodes\n    s.hosts.forEach(host=>{\n      if(host.id==='siem' && !showTele){\n        // red has no telemetry visibility — ghost the SIEM\n        const [x,y]=this.xy(host.id);\n        els.push(h('g',{ key:'siem-ghost' },\n          h('circle',{ cx:x,cy:y,r:20, fill:'none', stroke:BORDER, strokeWidth:1, strokeDasharray:'2 5', style:{ opacity:.35 } }),\n          h('text',{ x, y:y+34, textAnchor:'middle', fill:DIM, style:{ fontFamily:'var(--font-mono)', fontSize:8.5, opacity:.5 } }, 'no telemetry'),\n        ));\n        return;\n      }\n      const [x,y]=this.xy(host.id);\n      const v=this.nodeVisual(host, eye);\n      const r = host.role==='siem'?18 : host.crown?22 : 19;\n      const fxType=s.fx[host.id];\n      const nodeAnim = fxType==='bite'?'pr-bite .7s cubic-bezier(.2,.8,.2,1)' : fxType==='compromise'?'pr-compromise .7s ease-out' : '';\n      const kids=[];\n      // crown halo\n      if(host.crown) kids.push(h('circle',{ key:'halo', cx:x,cy:y,r:r+7, fill:'none', stroke:GOLD, strokeWidth:1, style:{ opacity:.5, animation:'pr-crown 2.4s ease-in-out infinite' } }));\n      // outer glow ring\n      kids.push(h('circle',{ key:'ring', cx:x,cy:y,r, fill:v.fill, stroke:v.ring, strokeWidth:v.rw, style:{ transition:'fill .4s, stroke .4s', filter:v.glow?`drop-shadow(0 0 8px ${v.glow})`:'none', transformBox:'fill-box', transformOrigin:'center', animation:nodeAnim } }));\n      // core\n      kids.push(h('circle',{ key:'core', cx:x,cy:y,r:host.crown?6:5, fill:v.core, style:{ transition:'fill .4s' } }));\n      // label\n      kids.push(h('text',{ key:'nm', x, y:y+r+14, textAnchor:'middle', fill:v.textCol, style:{ fontFamily:'var(--font-mono)', fontSize:12, fontWeight:700 } }, host.label));\n      kids.push(h('text',{ key:'ip', x, y:y+r+25, textAnchor:'middle', fill:DIM, style:{ fontFamily:'var(--font-mono)', fontSize:8.5 } }, host.ip));\n      // status badge\n      if(v.badge) kids.push(h('text',{ key:'bd', x, y:y-r-8, textAnchor:'middle', fill:v.badgeCol, style:{ fontFamily:'var(--font-mono)', fontSize:8.5, fontWeight:700, letterSpacing:'.5px' } }, v.badge));\n      els.push(h('g',{ key:host.id }, ...kids));\n    });\n    return h('svg',{ viewBox:'0 0 1000 400', width:'100%', style:{ display:'block', height:'auto' }, role:'img', 'aria-label':'battlefield' }, ...els);\n  }\n  nodeVisual(host, eye){\n    const RED='#ff4444', BLUE='#00e0ff', AMBER='#ffa500', GOLD='#ffd700', BORDER='#3c4a6a', SURF='#141c30', T1='#f0f1f5', T3='#5a6a8a';\n    const rgba=(hex,a)=>{ const n=parseInt(hex.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; };\n    let fill=SURF, ring=BORDER, rw=2, glow='', core=T3, textCol=T1, badge='', badgeCol=T3;\n    const red=host.red, det=host.det;\n    if(host.role==='attacker'){ fill=rgba(RED,.16); ring=RED; core=RED; badge='C2'; badgeCol=RED; glow=eye!=='Blue'?RED:''; if(eye==='Blue'){ fill=SURF; ring=BORDER; core=T3; badge=''; glow=''; } return { fill,ring,rw,glow,core,textCol,badge,badgeCol }; }\n    if(host.role==='siem'){ fill=rgba('#a78bfa',.14); ring='#a78bfa'; core='#a78bfa'; badge=this.state.alerts>0?(this.state.alerts+' alerts'):'watching'; badgeCol='#a78bfa'; glow='#a78bfa'; return { fill,ring,rw:2,glow,core,textCol,badge,badgeCol }; }\n\n    if(eye==='Red'){\n      // red sees only its own ground truth; blue overlay invisible\n      if(red==='owned'){ fill=rgba(RED,.3); ring=RED; core=RED; glow=RED; badge='OWNED'; badgeCol=RED; }\n      else if(red==='compromised'){ fill=rgba(RED,.16); ring=RED; core=RED; glow=RED; badge='FOOTHOLD'; badgeCol=RED; }\n      else { fill=SURF; ring=BORDER; core=T3; }\n      if(det==='contained' && red!=='clean'){ fill=SURF; ring='#3a4560'; core=T3; badge='LOST?'; badgeCol=T3; glow=''; }\n      if(host.crown){ ring=red==='clean'?GOLD:RED; }\n    } else if(eye==='Blue'){\n      // blue sees only what telemetry surfaced; red ground truth hidden\n      if(det==='contained'){ fill=rgba(BLUE,.18); ring=BLUE; core=BLUE; glow=BLUE; badge='CONTAINED'; badgeCol=BLUE; rw=2.4; }\n      else if(det==='detected'){ fill=rgba(AMBER,.14); ring=AMBER; core=AMBER; glow=AMBER; badge='SUSPECT'; badgeCol=AMBER; }\n      else { fill=SURF; ring=BORDER; core=T3; }\n      if(host.crown){ ring=det==='none'?GOLD:ring; badge=det==='none'?'PROTECTED':badge; badgeCol=det==='none'?GOLD:badgeCol; }\n    } else {\n      // referee — omniscient\n      if(red==='owned'){ fill=rgba(RED,.3); glow=RED; core=RED; }\n      else if(red==='compromised'){ fill=rgba(RED,.14); core=RED; }\n      ring = det==='contained'?BLUE : det==='detected'?AMBER : (red!=='clean'?RED:BORDER);\n      if(det==='contained'){ glow=BLUE; rw=2.4; }\n      badge = red==='owned'?'OWNED' : det==='contained'?'CONTAINED' : det==='detected'?'DETECTED' : red==='compromised'?'FOOTHOLD' : '';\n      badgeCol = det==='contained'?BLUE : det==='detected'?AMBER : red!=='clean'?RED : T3;\n      if(host.crown && red==='clean'){ ring=GOLD; }\n    }\n    return { fill,ring,rw,glow,core,textCol,badge,badgeCol };\n  }\n\n  // ── render values ─────────────────────────────────────────────\n  renderVals(){\n    const s=this.state;\n    const RED='#ff4444', BLUE='#00e0ff', PURP='#a78bfa', GOLD='#ffd700', GREEN='#00ff88', AMBER='#ffa500';\n    const btn=(active,color)=>`font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;padding:7px 13px;cursor:pointer;border:none;background:${active?color:'transparent'};color:${active?'#06121a':'var(--text-2)'};font-weight:${active?700:500}`;\n    const human=this.actorIsHuman();\n    const finished=s.finished;\n    const aiTurn=!human && !finished;\n\n    // team pill\n    const turnColor = s.turn==='Red'?RED:BLUE;\n    const turnPillStyle = `font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:6px 12px;border-radius:6px;color:${turnColor};border:1px solid ${turnColor};background:${s.turn==='Red'?'rgba(255,68,68,.1)':'rgba(0,224,255,.1)'}`;\n    const turnLabel = finished ? 'MATCH OVER' : `${s.turn==='Red'?'◉ RED':'◆ BLUE'} to move`;\n\n    // eye\n    const eyeMap={ referee:{n:'REFEREE',tone:PURP,desc:'Omniscient — both sides revealed. This is the ground truth neither player can see.'},\n      Red:{n:'RED EYES',tone:RED,desc:'Your foothold and its spread. Blue detections, containments and the SIEM are hidden from you.'},\n      Blue:{n:'BLUE EYES',tone:BLUE,desc:'Detections, telemetry and honeytokens. The adversary\\u2019s true position stays hidden until you catch it.'} };\n    const em=eyeMap[s.eye]||eyeMap.referee;\n\n    // flags (referee ground truth)\n    const yn=(b,t,f)=>b?(t||'YES'):(f||'NO');\n    const flags=[\n      { label:'red creds', val:yn(s.redCred), color:s.redCred?RED:'#5a6a8a' },\n      { label:'bloodhound', val:yn(s.bloodhound,'MAPPED','NO'), color:s.bloodhound?RED:'#5a6a8a' },\n      { label:'dc01 owned', val:yn(s.dcOwned), color:s.dcOwned?RED:GREEN },\n      { label:'blue watching', val:yn(s.blueWatching,'ARMED','NO'), color:s.blueWatching?BLUE:'#5a6a8a' },\n      { label:'alerts', val:String(s.alerts), color:s.alerts?AMBER:'#5a6a8a' },\n      { label:'honeytokens', val:String(s.honeytokens), color:s.honeytokens?PURP:'#5a6a8a' },\n    ];\n\n    // timeline\n    const scale=v=>Math.max(v>0?3:0, Math.min(18, v*1.1));\n    const timeline=s.rounds.slice(-8).map(r=>({ n:r.n, rh:scale(r.red), bh:scale(r.blue), tip:`round ${r.n}: red +${r.red} · blue +${r.blue}` }));\n\n    // kill chain phase\n    const kcOrder=[['recon','recon'],['kerberoast','kerberoast'],['asrep','as-rep'],['bloodhound','bloodhound'],['dcsync','dcsync'],['golden','domain admin']];\n    let phaseName='recon'; for(const [k,l] of kcOrder){ if(s.kc[k]) phaseName=l; }\n\n    // feed filter by eye (fog of war)\n    const seat=s.eye;\n    const badgeStyleFor=(b)=>{ const map={ STEALTH:RED, DETECTED:AMBER, CONTAINED:BLUE, HONEYPOT:PURP, HARDEN:BLUE, BLOCKED:GREEN, OBJECTIVE:GOLD, INTEL:'#7a86a0' }; const c=map[b]||'#7a86a0'; return `font-family:var(--font-mono);font-size:8.5px;font-weight:700;letter-spacing:.06em;color:${c};border:1px solid ${c};border-radius:4px;padding:1px 6px;flex:none;white-space:nowrap`; };\n    const feed=s.feed.filter(f=> seat==='referee' ? f.vis.includes('referee') : f.vis.includes(seat))\n      .slice().reverse()\n      .map(f=>({ id:f.id, rnd:'r'+(s.rounds.length? Math.min(s.round, s.maxRounds):s.round), badge:f.badge, badgeStyle:badgeStyleFor(f.badge), sideColor:f.side==='Red'?RED:f.side==='Blue'?BLUE:PURP, text:f.text }));\n    const feedScopeNote = seat==='referee'?'referee stream · full ground truth' : seat==='Red'?'red seat · blue activity hidden' : 'blue seat · adversary truth hidden';\n\n    // hand\n    const showHand = human && !finished && !s.showHandoff;\n    const handSide=s.turn;\n    const handColor = handSide==='Red'?RED:BLUE;\n    let hand=[];\n    if(showHand){\n      hand=this.legalFor(handSide).map(c=>{\n        const tierCol=c.tier==='DESTRUCTIVE'?RED:c.tier==='MUTATING'?AMBER:GREEN;\n        const tierGlyph=c.tier==='DESTRUCTIVE'?'◉':c.tier==='MUTATING'?'◈':'◇';\n        const params=(c.params_schema||[]).map(p=>{\n          const isEnum=p.type==='enum', isFixed=p.type==='fixed';\n          const value=isFixed?p.value:this.paramVal(c.id,p.key,p.options[0]);\n          return { key:p.key, label:p.label, isEnum, isFixed, options:p.options||[], value,\n            onChange:(e)=>this.setParam(c.id,p.key,e.target.value) };\n        });\n        const playStyle=`width:100%;font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;border:none;border-radius:7px;padding:9px;cursor:pointer;color:#06121a;background:${handColor}`;\n        return { id:c.id, name:c.technique.split(' · ')[1]||c.id, technique:c.technique.split(' · ')[0], summary:c.summary,\n          tier:c.tier, tierGlyph, tierStyle:`font-family:var(--font-mono);font-size:8.5px;font-weight:700;letter-spacing:.04em;color:${tierCol};border:1px solid ${tierCol};border-radius:4px;padding:1px 6px`,\n          nameColor:handColor, legal:c.legal, illegal:!c.legal, reason:c.reason,\n          locked:false, params, playStyle, playLabel:s.live?'◉ Fire (LIVE)':'▸ Play card',\n          cardStyle:`border:1px solid ${c.legal?'var(--border-2)':'var(--border-1)'};border-radius:10px;padding:11px 12px;margin-bottom:10px;background:var(--bg-0);opacity:${c.legal?1:0.6}`,\n          play:()=>this.playMove(handSide, c.id, this.cardParams(c.id), false) };\n      });\n    }\n\n    // autonomous panel\n    const showAuto = !human && !finished && !s.showHandoff;\n    const autoColor = s.turn==='Red'?RED:BLUE;\n    const autoTitle = s.paused?'PAUSED': `${s.turn==='Red'?'◉ RED':'◆ BLUE'} is planning\\u2026`;\n    const autoNote = s.mode==='spectate'\n      ? 'Both cells run autonomously — a local model (or heuristic) picks each legal card. Step manually or let it run.'\n      : `${s.turn} is the AI opponent. It plays from the model endpoint; your turn resumes after its move.`;\n\n    // command panel chrome\n    const commandBorder = finished? GOLD : human? handColor : 'var(--border-1)';\n\n    // handoff\n    const handoffColor = s.handoffSide==='Red'?RED:BLUE;\n\n    // arch spec content\n    const archComponents=[\n      { name:'SetupBar', owns:'mode · side · sim/live · model endpoint', binds:'POST /api/reset · drives GET /api/game?live=' },\n      { name:'Battlefield', owns:'hosts[] node states · edges · hotEdges · fx · eye', binds:'start{battlefield} · round.bf{} · per-seat fog filter' },\n      { name:'Scoreboard + Timeline', owns:'redScore · blueScore · rounds[]', binds:'round{red,blue} · end{winner}' },\n      { name:'PlayByPlay', owns:'feed[] {vis,side,badge,text}', binds:'round{lines[]} · filtered by seat (fog)' },\n      { name:'Hand', owns:'params{cardId} selections', binds:'GET /api/legal?side= · POST /api/move{side,card,params}' },\n      { name:'ObjectiveFlags', owns:'redCred·bloodhound·dcOwned·blueWatching·alerts·honeytokens', binds:'round.bf{}' },\n      { name:'FogEngine (nodeVisual/feed filter)', owns:'eye → what each seat may render', binds:'hard rule — red ≠ blue view; referee = truth' },\n    ];\n    const archContracts=[\n      { route:'GET /api/catalog', shape:'{ cards:[{ id, side:\"Red\"|\"Blue\", technique, summary, params_schema }] }' },\n      { route:'GET /api/game?live=0|1  (SSE)', shape:'start{ battlefield, objective, mode }\\nround{ round, lines[], red, blue, finished, winner,\\n  bf{ red_cred, bloodhound, dc_owned, blue_watching, alerts, honeytokens } }\\nend{}' },\n      { route:'GET /api/legal?side=  (human turns)', shape:'→ legal CardSpec[] for that seat this turn (evolves with defenses)' },\n      { route:'POST /api/move', shape:'{ side, card, params } → applies move, emits next round{} over the game SSE' },\n      { route:'POST /api/reset', shape:'{ ok, msg } — rebuilds the range; frozen topology, cleared state' },\n    ];\n\n    // endpoint dot\n    const epOk=/^https?:\\/\\/.+/.test(s.endpointUrl) && s.endpointModel.length>0;\n    const endpointDotColor = epOk?GREEN:AMBER;\n\n    return {\n      rangeName:'purple range', sub:'red-vs-blue wargame · command center',\n      // top bar\n      live:s.live, notLive:!s.live,\n      simBtnStyle: btn(!s.live, GREEN), liveBtnStyle: `font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;padding:7px 13px;cursor:pointer;border:none;font-weight:${s.live?700:500};background:${s.live?RED:'transparent'};color:${s.live?'#fff':'var(--text-2)'}`,\n      setSim:()=>this.setLive(false), setLive:()=>this.setLive(true),\n      stakesNote: s.live?'Real ops fire on live hardware over SSH. Every action is recorded.':'Simulated range — safe to explore. No hardware touched.',\n      roundLabel:`${Math.min(s.round,s.maxRounds)} / ${s.maxRounds}`,\n      turnPillStyle, turnLabel,\n      toggleArch:()=>this.toggleArch(),\n      // setup bar\n      mode:s.mode, pickSide:s.mode==='1p',\n      mSpecStyle:btn(s.mode==='spectate',PURP), m1pStyle:btn(s.mode==='1p',PURP), m2pStyle:btn(s.mode==='2p',PURP),\n      setModeSpectate:()=>this.setMode('spectate'), setMode1p:()=>this.setMode('1p'), setMode2p:()=>this.setMode('2p'),\n      sideRedStyle:btn(s.side==='Red',RED), sideBlueStyle:btn(s.side==='Blue',BLUE),\n      setSideRed:()=>this.setSide('Red'), setSideBlue:()=>this.setSide('Blue'),\n      endpointUrl:s.endpointUrl, endpointModel:s.endpointModel, endpointDotColor,\n      setEndpointUrl:(e)=>this.setState({endpointUrl:e.target.value}), setEndpointModel:(e)=>this.setState({endpointModel:e.target.value}),\n      newGame:()=>this.newGame(),\n      resetBtnStyle:`font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:${s.live?'#fff':RED};background:${s.live?RED:'transparent'};border:1px solid ${RED};border-radius:7px;padding:8px 15px;cursor:pointer;font-weight:700`,\n      resetRange:()=>this.resetRange(),\n      // battlefield\n      battlefield:this.renderBattlefield(),\n      canToggleEye:s.mode==='spectate', eyeLocked:s.mode!=='spectate',\n      eyeRefStyle:btn(s.eye==='referee',PURP), eyeRedStyle:btn(s.eye==='Red',RED), eyeBlueStyle:btn(s.eye==='Blue',BLUE),\n      setEyeRef:()=>this.setEye('referee'), setEyeRed:()=>this.setEye('Red'), setEyeBlue:()=>this.setEye('Blue'),\n      eyeLockLabel: s.eye==='Red'?'◉ RED EYES':'◆ BLUE EYES',\n      eyeLockStyle:`font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.06em;color:${em.tone};border:1px solid ${em.tone};border-radius:6px;padding:5px 10px`,\n      eyeName:em.n, eyeDesc:em.desc, eyeTone:em.tone,\n      // scoreboard\n      redScore:s.redScore, blueScore:s.blueScore,\n      timeline, noRounds:timeline.length===0,\n      showWinner:finished, winnerText: finished?(s.winner==='Red'?'◉ RED WINS — dc01 owned':'◆ BLUE WINS — crown held'):'',\n      winnerTone: s.winner==='Red'?RED:BLUE,\n      winnerBannerStyle:`position:absolute;top:0;left:0;right:0;text-align:center;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.1em;padding:5px;color:#06121a;background:${s.winner==='Red'?RED:BLUE}`,\n      flags,\n      // feed\n      feed, feedEmpty:feed.length===0, feedScopeNote,\n      // command / hand\n      showHand, handTitle: showHand?`Your hand · ${handSide}`: finished?'Match complete': (s.mode==='spectate'?'Autonomous match':'Opponent turn'),\n      handKicker: showHand?`${hand.filter(c=>c.legal).length} legal`:'',\n      handNote: `Pick one legal card and set its params. ${s.live?'LIVE — actions fire on real hardware.':'Simulated.'}`,\n      hand, commandBorder,\n      commandDotStyle:`width:9px;height:9px;border-radius:50%;flex:none;background:${finished?GOLD:human?handColor:autoColor};box-shadow:0 0 7px ${finished?GOLD:human?handColor:autoColor}`,\n      showAuto, autoColor, autoTitle, autoNote,\n      autoDotStyle:`width:34px;height:34px;border-radius:50%;border:2px solid ${autoColor};border-top-color:transparent;animation:${s.paused?'none':'pr-spin 1s linear infinite'}`,\n      pauseLabel:s.paused?'▸ Resume':'❚❚ Pause', togglePause:()=>this.togglePause(), stepRound:()=>this.stepRound(),\n      finished, winnerTone: s.winner==='Red'?RED:BLUE,\n      finishNote: s.winner==='Red'?'Red reached Domain Admin before Blue could contain the chain. Rewind and let the pitbull off the leash earlier.':'Blue held dc01 through the full match — detections, containment and hardening outpaced the kill chain.',\n      // modals\n      pendingLive:!!s.pendingLive, pendingText:s.pendingLive?s.pendingLive.text:'',\n      confirmLive:()=>this.confirmLive(), cancelLive:()=>this.cancelLive(),\n      showHandoff:s.showHandoff, handoffSide:s.handoffSide,\n      handoffColor, handoffTitle: s.handoffSide==='Red'?'RED\\u2019s turn':'BLUE\\u2019s turn',\n      handoffNote: `${s.handoffSide==='Red'?'Blue':'Red'}, look away. This screen shows only ${s.handoffSide}\\u2019s view — the other seat\\u2019s intel stays fogged.`,\n      revealHandoff:()=>this.revealHandoff(),\n      // arch\n      showArch:s.showArch, archComponents, archContracts,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
